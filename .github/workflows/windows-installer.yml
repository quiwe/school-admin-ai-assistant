name: Build Windows Installer

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend into FastAPI static directory
        shell: pwsh
        run: |
          if (Test-Path backend/app/static) { Remove-Item backend/app/static -Recurse -Force }
          New-Item -ItemType Directory -Force -Path backend/app/static | Out-Null
          Copy-Item frontend/dist/* backend/app/static -Recurse -Force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build desktop executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller
          pyinstaller --noconfirm packaging/pyinstaller.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolAdminAIAssistant-Windows-Installer
          path: installer-output/SchoolAdminAIAssistant-Setup.exe

      - name: Publish latest GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $asset = "installer-output/SchoolAdminAIAssistant-Setup.exe"
          $notes = "Automated Windows installer build from commit $env:GITHUB_SHA.`n`nDefault install path: D:\SchoolAdminAIAssistant"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "Latest Windows Installer" --notes $notes
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title "Latest Windows Installer" --notes $notes --latest
          }

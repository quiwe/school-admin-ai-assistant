name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load release metadata
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $developer = (Get-Content DEVELOPER -Raw).Trim()
          $installerBaseName = "SchoolAdminAIAssistant-Setup-v$version"
          $tag = "v$version"
          $changelog = Get-Content CHANGELOG.md -Raw
          $escapedVersion = [Regex]::Escape($version)
          $pattern = "(?ms)^##\s+$escapedVersion\s+-.*?(?=^##\s+|\z)"
          $match = [Regex]::Match($changelog, $pattern)
          $notes = if ($match.Success) { $match.Value.Trim() } else { "Version $version`n`n$changelog" }
          $notes = "$notes`n`n开发者：$developer`n默认安装路径：D:\SchoolAdminAIAssistant"

          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APP_DEVELOPER=$developer" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "INSTALLER_BASENAME=$installerBaseName" >> $env:GITHUB_ENV
          "INSTALLER_PATH=installer-output/$installerBaseName.exe" >> $env:GITHUB_ENV
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notesPath -Value $notes -Encoding UTF8
          "RELEASE_NOTES_PATH=$notesPath" >> $env:GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend into FastAPI static directory
        shell: pwsh
        run: |
          if (Test-Path backend/app/static) { Remove-Item backend/app/static -Recurse -Force }
          New-Item -ItemType Directory -Force -Path backend/app/static | Out-Null
          Copy-Item frontend/dist/* backend/app/static -Recurse -Force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build desktop executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller
          pyinstaller --noconfirm packaging/pyinstaller.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="$env:APP_VERSION" `
            /DMyAppPublisher="$env:APP_DEVELOPER" `
            /DMyOutputBaseFilename="$env:INSTALLER_BASENAME" `
            packaging\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolAdminAIAssistant-Windows-Installer-v${{ env.APP_VERSION }}
          path: ${{ env.INSTALLER_PATH }}

      - name: Publish versioned GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $asset = $env:INSTALLER_PATH
          $title = "高校行政AI回复助手 $env:APP_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $title --notes-file $env:RELEASE_NOTES_PATH --latest
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $title --notes-file $env:RELEASE_NOTES_PATH --latest
          }
